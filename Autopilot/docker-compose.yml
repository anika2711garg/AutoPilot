version: '3.8'

services:
  db:
    image: postgres:15
    container_name: autopilot_db
    environment:
      POSTGRES_USER: autopilot
      POSTGRES_PASSWORD: autopilot_password
      POSTGRES_DB: autopilot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: autopilot_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
